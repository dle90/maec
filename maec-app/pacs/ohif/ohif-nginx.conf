server {
  gzip_static  always;
  gzip_proxied expired no-cache no-store private auth;
  gunzip       on;
  listen 80 default_server;
  listen [::]:80 default_server;

  # Serve OHIF app
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
    add_header Cross-Origin-Resource-Policy same-origin;
    gzip_static on;
  }

  # Proxy DICOMweb (WADO-RS/QIDO-RS) to Orthanc
  # ORTHANC_BACKEND_URL is substituted at container startup via envsubst
  # Works for both http://orthanc:8042 (local) and https://... (cloud)
  #
  # Host header: rely on nginx default (Host: $proxy_host = upstream hostname).
  # Do NOT override to $host — Railway routes by Host, so sending OHIF's own
  # domain causes an edge-routing loop back to OHIF (→ 502 after timeout).
  location /wado/ {
    proxy_pass ${ORTHANC_BACKEND_URL}/wado/;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
    if ($request_method = OPTIONS) { return 204; }
  }

  # Proxy WADO-URI
  location = /wado {
    proxy_pass ${ORTHANC_BACKEND_URL}/wado;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    add_header Access-Control-Allow-Origin *;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
