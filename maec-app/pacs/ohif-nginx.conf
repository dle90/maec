server {
  gzip_static  always;
  gzip_proxied expired no-cache no-store private auth;
  gunzip       on;
  listen 80 default_server;
  listen [::]:80 default_server;

  # Serve OHIF app (original config preserved)
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
    add_header Cross-Origin-Resource-Policy same-origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # Proxy DICOMweb (WADO-RS/QIDO-RS) to Orthanc — avoids CORS
  # ORTHANC_BACKEND_URL is substituted at container startup via envsubst
  location /wado/ {
    proxy_pass ${ORTHANC_BACKEND_URL}/wado/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
    if ($request_method = OPTIONS) { return 204; }
  }

  # Proxy WADO-URI
  location = /wado {
    proxy_pass ${ORTHANC_BACKEND_URL}/wado;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin *;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
